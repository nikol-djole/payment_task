<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Page for buying things...</title>
  <style>
    body {
      background-color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #root {
      width: 100vw;
      height: 100vh;
      background-color: whitesmoke;
      display: flex;
      flex-direction: column;
    }

    #header {
      width: 100%;
      height: 5%;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    #root_1 {
      width: 100%;
      background-color: white;
      height: 95%;
      display: grid;
      grid-template-columns: repeat(auto-fit, 200px);
      grid-auto-rows: 260px;
      gap: 15px;
      margin: 10px;
      justify-items: stretch;
      align-items: stretch;
      position: relative;
    }

    .article_container {
      background-color: whitesmoke;
      padding: 10px;
      border: 1px solid black;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border-radius: 5%;
    }

    .product_img {
      width: 90%;
      height: 170px;
      object-fit: cover;
    }

    .price_and_button {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      color: green;
    }

    .hidden {
      display: none !important;
    }

    #login_box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 250px;
      padding: 20px;
      background-color: white;
      border: 1px solid black;
      border-radius: 8px;
      z-index: 100000;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    #username,
    #password,
    #login_button {
      padding: 8px;
    }

    #congrats_window {
      width: 50%;
      height: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
      position: absolute;
      top: 10%;
      left: 25%;
      z-index: 1000;
      border: 1px solid black;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    #x {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1px solid black;
      background-color: red;
      cursor: pointer;
    }

    #congrats_text {
      font-family: Arial, sans-serif;
      font-style: italic;
      margin-top: 100px;
      font-size: 20px;
      font-weight: bold;
      color: green;
      text-align: center;
      padding: 10px;
      width: 100%;
      height: 90%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .alert_box {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: red;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      font-weight: bold;
      z-index: 9999;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="header">WELLCOME</div>
    <div id="root_1"></div>
  </div>

  <div id="login_box" class="hidden">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password" type="password">
    <button id="login_button">Login</button>
  </div>

  <div id="congrats_window" class="hidden">
    <button id="x"></button>
    <div id="congrats_text">Congratulations! You have ve bought your self a nice thing!</div>
  </div>

  <script>
    const APP_URL = "http://localhost:3000";
    function make_congrats_window() {
      document.getElementById("congrats_window").classList.remove("hidden");
    }

    const nums = [5142, 6632, 3409, 561, 2133, 1647, 2728, 3945, 2700, 6214];
    const pics = [
      "https://picsum.photos/id/10/300/200",
      "https://picsum.photos/id/20/300/200",
      "https://picsum.photos/id/30/300/200",
      "https://picsum.photos/id/40/300/200",
      "https://picsum.photos/id/50/300/200",
      "https://picsum.photos/id/60/300/200",
      "https://picsum.photos/id/70/300/200",
      "https://picsum.photos/id/80/300/200",
      "https://picsum.photos/id/90/300/200",
      "https://picsum.photos/id/100/300/200"
    ];

    async function get_customer_id() {
      const loginBox = document.getElementById("login_box");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginButton = document.getElementById("login_button");

      loginBox.classList.remove("hidden");
      usernameInput.value = "";
      passwordInput.value = "";

      return await new Promise((resolve) => {
        function handleLogin() {
          loginButton.removeEventListener("click", handleLogin);
          loginBox.classList.add("hidden");
          resolve({
            username: usernameInput.value,
            password: passwordInput.value
          });
        }

        loginButton.addEventListener("click", handleLogin);
      });
    }

    const container = document.getElementById("root_1");

    for (let i = 0; i < 10; i++) {
      const article = document.createElement("div");
      article.id = `article_container_${i}`;
      article.className = "article_container";

      const img = document.createElement("img");
      img.src = pics[i];
      img.alt = "product";
      img.id = `img_${i}`;
      img.className = "product_img";

      const price_and_button = document.createElement("div");
      price_and_button.id = `price_and_button_${i}`;
      price_and_button.className = "price_and_button";

      const price = document.createElement("div");
      price.id = `price_${i}`;
      price.className = "price";
      price.innerText = `Price: ${nums[i]} CHF`;

      const button = document.createElement("button");
      button.id = `payBtn_${i}`;
      button.innerText = "Pay";
      button.dataset.prod = `PROD${String(i + 1).padStart(3, "0")}`;

      price_and_button.appendChild(price);
      price_and_button.appendChild(button);

      article.appendChild(img);
      article.appendChild(price_and_button);
      container.appendChild(article);
    }

    function showAlert(message) {
      const alertBox = document.createElement("div");
      alertBox.innerText = message;
      alertBox.className = "alert_box";

      document.body.appendChild(alertBox);

      setTimeout(() => {
        alertBox.remove();
      }, 3000);
    }

    document.getElementById("root").addEventListener("click", async (e) => {
      if (!e.target.id.startsWith("payBtn_")) return;

      e.target.disabled = true;
      setTimeout(() => {
        e.target.disabled = false;
      }, 3000);

        const customer_id = await get_customer_id();


      const customer_data_call = await fetch(`${APP_URL}/customers`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: customer_id.username,
          password: customer_id.password
        })
      });

      const customer_data = await customer_data_call.json();

      if (customer_data.error) {
        showAlert("INVALID CREDENTIALS...");
        return;
      }

     const productId = e.target.dataset.prod;


      const productDataCall = await fetch(`${APP_URL}/products`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          prod_id: productId
        })
      });

      const productData = await productDataCall.json();

      if (productData.error) {
        showAlert("PRODUCT COULD NOT BE LOADED...");
        return;
      }

      const gateWayInfo = await fetch(`${APP_URL}/payments`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Idempotency-Key": crypto.randomUUID()
        },
        body: JSON.stringify({
          userId: customer_data.userId,
          amount: parseInt(productData.price),
          currency: productData.currency
        })
      });

      const gateWayPaymentData = await gateWayInfo.json();

      if (!gateWayPaymentData.checkoutUrl) {
        showAlert("SOMETHING WENT WRONG... PLEASE TRY AGAIN LATER");
        return;
      }

        const payWindow = window.open(gateWayPaymentData.checkoutUrl, "_blank");

      const paymentId = gateWayPaymentData.paymentId;

      const pollPayment = setInterval(async () => {
        try {
          const paymentDataPoll = await fetch(`${APP_URL}/payments/${paymentId}`, {
            method: "GET"
          });

          const paymentData = await paymentDataPoll.json();

          if (paymentData.error) {
            console.log("Polling error:", paymentData.error);
            return;
          }

          let actionPointer = null;
          if (paymentData.payment_data?.status) {
            actionPointer = paymentData.payment_data.status;
          }

          console.log(actionPointer);

          if (actionPointer === "CAPTURED") {
            clearInterval(pollPayment);
            await new Promise(resolve => setTimeout(resolve, 3000));
            payWindow.close();
            make_congrats_window();

          }

          if (actionPointer === "FAILED") {
            clearInterval(pollPayment);
            await new Promise(resolve => setTimeout(resolve, 3000));
            payWindow.close();
            showAlert("Payment failed");

          }
        } catch (err) {
          console.log("Polling crashed:", err);
        }
      }, 2000);

      setTimeout(() => {
        clearInterval(pollPayment);
        console.log("stopped polling after 2 minutes");
      }, 120000);
    });

    document.addEventListener("click", (e) => {
      if (e.target.id === "x") {
        document.getElementById("congrats_window")?.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
