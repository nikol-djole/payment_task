<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metrics</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: whitesmoke;
      margin: 0;
      padding: 30px;
    }

    #root {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 10px;
      font-size: 20px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 18px;
    }

    .metric:last-child {
      border-bottom: none;
    }

    .label {
      font-weight: bold;
    }

    #status {
      margin-top: 16px;
      color: #666;
      font-size: 14px;
    }

    .section {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="root">
    <h1>Server Metrics</h1>

    <div class="section">
      <h2>Event Loop Lag</h2>
      <div class="metric"><span class="label">Samples</span><span id="lag_samples"></span></div>
      <div class="metric"><span class="label">Average lag</span><span id="lag_avg"></span></div>
      <div class="metric"><span class="label">P95 lag</span><span id="lag_p95"></span></div>
      <div class="metric"><span class="label">P99 lag</span><span id="lag_p99"></span></div>
      <div class="metric"><span class="label">Max lag</span><span id="lag_max"></span></div>
    </div>

    <div class="section">
      <h2>POST /payments</h2>
      <div class="metric"><span class="label">Samples</span><span id="payments_count"></span></div>
      <div class="metric"><span class="label">P95</span><span id="payments_p95"></span></div>
      <div class="metric"><span class="label">P99</span><span id="payments_p99"></span></div>
    </div>

    <div class="section">
      <h2>GET /customers</h2>
      <div class="metric"><span class="label">Samples</span><span id="customers_count"></span></div>
      <div class="metric"><span class="label">P95</span><span id="customers_p95"></span></div>
      <div class="metric"><span class="label">P99</span><span id="customers_p99"></span></div>
    </div>

    <div class="section">
      <h2>GET /products</h2>
      <div class="metric"><span class="label">Samples</span><span id="products_count"></span></div>
      <div class="metric"><span class="label">P95</span><span id="products_p95"></span></div>
      <div class="metric"><span class="label">P99</span><span id="products_p99"></span></div>
    </div>

    <div class="section">
      <h2>POST /webhooks/mock</h2>
      <div class="metric"><span class="label">Samples</span><span id="webhooks_count"></span></div>
      <div class="metric"><span class="label">P95</span><span id="webhooks_p95"></span></div>
      <div class="metric"><span class="label">P99</span><span id="webhooks_p99"></span></div>
    </div>

    <div class="section">
      <h2>GET /payments/:id</h2>
      <div class="metric"><span class="label">Samples</span><span id="paymentById_count"></span></div>
      <div class="metric"><span class="label">P95</span><span id="paymentById_p95"></span></div>
      <div class="metric"><span class="label">P99</span><span id="paymentById_p99"></span></div>
    </div>

    <div id="status">Loading...</div>
  </div>

  <script>
    function fmtMs(value) {
      if (value === null || value === undefined) return "";
      return `${value} ms`;
    }

    function fmtVal(value) {
      if (value === null || value === undefined) return "";
      return value;
    }

    function setText(id, value) {
      document.getElementById(id).innerText = value;
    }

    function renderRoute(prefix, routeData) {
      setText(`${prefix}_count`, fmtVal(routeData?.count));
      setText(`${prefix}_p95`, fmtMs(routeData?.p95_ms));
      setText(`${prefix}_p99`, fmtMs(routeData?.p99_ms));
    }

    async function loadMetrics() {
      try {
        const res = await fetch("/metrics-data");
        const data = await res.json();

        setText("lag_samples", fmtVal(data.lag?.samples));
        setText("lag_avg", fmtMs(data.lag?.avgLagMs));
        setText("lag_p95", fmtMs(data.lag?.p95LagMs));
        setText("lag_p99", fmtMs(data.lag?.p99LagMs));
        setText("lag_max", fmtMs(data.lag?.maxLagMs));

        renderRoute("payments", data.routes?.payments);
        renderRoute("customers", data.routes?.customers);
        renderRoute("products", data.routes?.products);
        renderRoute("webhooks", data.routes?.webhooksMock);
        renderRoute("paymentById", data.routes?.paymentById);

        setText("status", `Updated: ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setText("status", "Failed to load metrics");
      }
    }

    loadMetrics();
    setInterval(loadMetrics, 3000);
  </script>
</body>
</html>
